openapi: 3.1.0
info:
  title: Task Manager Backend API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8080
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      tags: [system]
      responses:
        "200":
          description: Service health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/register:
    post:
      security: []
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegisterRequest" } } }
      responses:
        "201": { description: Registered session., content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /auth/login:
    post:
      security: []
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/LoginRequest" } } }
      responses:
        "200": { description: Authenticated session., content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /auth/logout:
    post:
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RefreshRequest" } } }
      responses:
        "204": { description: Refresh session revoked. }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /auth/refresh:
    post:
      security: []
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RefreshRequest" } } }
      responses:
        "200": { description: Rotated session., content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /auth/me:
    get:
      tags: [auth]
      responses:
        "200": { description: Current user., content: { application/json: { schema: { $ref: "#/components/schemas/AuthUser" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/{id}/complete:
    post:
      tags: [tasks]
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200": { description: Authoritative completion outcome with refreshed visual_state. Idempotent on repeat (is_fresh_completion_event=false)., content: { application/json: { schema: { $ref: "#/components/schemas/CompletionPayload" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /profile:
    get:
      tags: [profile]
      responses:
        "200": { description: Current user profile., content: { application/json: { schema: { $ref: "#/components/schemas/ProfileResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
    patch:
      tags: [profile]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ProfilePatchRequest" } } }
      responses:
        "200": { description: Updated current user profile., content: { application/json: { schema: { $ref: "#/components/schemas/ProfileResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /profile/progression:
    get:
      tags: [profile]
      responses:
        "200": { description: Current user progression., content: { application/json: { schema: { $ref: "#/components/schemas/Progression" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /inventory:
    get:
      tags: [inventory]
      responses:
        "200": { description: Current user owned items and equipped bindings., content: { application/json: { schema: { $ref: "#/components/schemas/InventoryResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /mascot/active:
    get:
      tags: [inventory]
      responses:
        "200": { description: Active mascot with equippable slots and placement anchors., content: { application/json: { schema: { $ref: "#/components/schemas/ActiveMascot" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /inventory/{userInventoryItemId}/equip:
    post:
      tags: [inventory]
      parameters:
        - name: userInventoryItemId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Item equipped into its slot on the active mascot (replaces any prior occupant)., content: { application/json: { schema: { $ref: "#/components/schemas/EquippedItem" } } } }
        "400": { $ref: "#/components/responses/Error", description: Item slot_key is not a slot on the active mascot. }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error", description: Item not owned by current user (also returned for foreign-owned ids; no cross-user leak). }
  /inventory/{userInventoryItemId}/unequip:
    post:
      tags: [inventory]
      parameters:
        - name: userInventoryItemId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Item unequipped. }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error", description: Item not currently equipped by current user. }
  /settings:
    get:
      tags: [settings]
      responses:
        "200": { description: Current user settings., content: { application/json: { schema: { $ref: "#/components/schemas/Settings" } } } }
        "401": { $ref: "#/components/responses/Error" }
    patch:
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SettingsPatchRequest" } } }
      responses:
        "200": { description: Updated current user settings., content: { application/json: { schema: { $ref: "#/components/schemas/Settings" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /visual-state:
    get:
      tags: [visual-state]
      responses:
        "200": { description: Current persisted visual state or stable fallback., content: { application/json: { schema: { $ref: "#/components/schemas/VisualState" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /visual-state/refresh:
    post:
      tags: [visual-state]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/VisualRefreshRequest" } } }
      responses:
        "200": { description: Refreshed or existing visual state., content: { application/json: { schema: { $ref: "#/components/schemas/VisualState" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /tasks:
    get:
      tags: [tasks]
      description: List tasks for the authenticated user with filters, sort, and pagination.
      parameters:
        - { in: query, name: status, schema: { type: string, enum: [active, archived, completed, all] }, default: active }
        - { in: query, name: category_id, schema: { type: string, format: uuid } }
        - { in: query, name: priority, schema: { type: string, enum: [low, normal, high] } }
        - { in: query, name: sort, schema: { type: string, enum: [overdue, deadline, created_at] }, default: overdue }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 }, default: 20 }
        - { in: query, name: offset, schema: { type: integer, minimum: 0 }, default: 0 }
      responses:
        "200": { description: Paginated task list. Overdue active tasks sort first. , content: { application/json: { schema: { $ref: "#/components/schemas/TaskListResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
    post:
      tags: [tasks]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TaskCreateRequest" } } }
      responses:
        "201": { description: Created task. , content: { application/json: { schema: { $ref: "#/components/schemas/Task" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/{id}:
    get:
      tags: [tasks]
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200": { description: Task detail., content: { application/json: { schema: { $ref: "#/components/schemas/Task" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [tasks]
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TaskPatchRequest" } } }
      responses:
        "200": { description: Updated task., content: { application/json: { schema: { $ref: "#/components/schemas/Task" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{id}/archive:
    post:
      tags: [tasks]
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200": { description: Archived task (status=archived)., content: { application/json: { schema: { $ref: "#/components/schemas/Task" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /task-categories:
    get:
      tags: [task-categories]
      description: Stable list of task categories for forms (system + user), ordered is_system DESC, title ASC.
      responses:
        "200": { description: Category list., content: { application/json: { schema: { $ref: "#/components/schemas/TaskCategoryListResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /admin/users:
    get:
      tags: [admin-users]
      description: Admin-only user list. Does not expose password hashes or refresh tokens.
      parameters:
        - { in: query, name: role, schema: { type: string, enum: [user, admin] } }
        - { in: query, name: q, schema: { type: string }, description: Case-insensitive email search. }
        - { in: query, name: sort, schema: { type: string, enum: [created_at, email, role] }, default: created_at }
        - { in: query, name: dir, schema: { type: string, enum: [asc, desc] }, default: desc }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 }, default: 20 }
        - { in: query, name: offset, schema: { type: integer, minimum: 0 }, default: 0 }
      responses:
        "200": { description: Paginated users., content: { application/json: { schema: { $ref: "#/components/schemas/AdminUsersResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /admin/items:
    get:
      tags: [admin-items]
      description: Admin catalog list with pagination, filters, and allowlisted sorting. Disabled items remain visible for audit and granted inventory safety.
      parameters:
        - { in: query, name: q, schema: { type: string }, description: Case-insensitive name/description search. }
        - { in: query, name: rarity, schema: { type: string, enum: [common, rare, epic, legendary] } }
        - { in: query, name: active, schema: { type: boolean } }
        - { in: query, name: slot, schema: { type: string } }
        - { in: query, name: sort, schema: { type: string, enum: [created_at, name, rarity, slot_key] }, default: created_at }
        - { in: query, name: dir, schema: { type: string, enum: [asc, desc] }, default: desc }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 }, default: 20 }
        - { in: query, name: offset, schema: { type: integer, minimum: 0 }, default: 0 }
      responses:
        "200": { description: Paginated catalog items., content: { application/json: { schema: { $ref: "#/components/schemas/AdminItemsResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      tags: [admin-items]
      description: Create catalog item and write item.create audit event. Does not grant inventory or XP.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AdminItemCreateRequest" } } }
      responses:
        "201": { description: Created catalog item., content: { application/json: { schema: { $ref: "#/components/schemas/AdminItem" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /admin/items/{id}:
    patch:
      tags: [admin-items]
      description: Patch mutable catalog fields and write item.update audit event. Rarity is immutable.
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AdminItemPatchRequest" } } }
      responses:
        "200": { description: Updated catalog item., content: { application/json: { schema: { $ref: "#/components/schemas/AdminItem" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /admin/items/{id}/disable:
    post:
      tags: [admin-items]
      description: Soft-disable catalog item and write item.disable audit event. Existing user_inventory_items are not deleted.
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200": { description: Disabled catalog item., content: { application/json: { schema: { $ref: "#/components/schemas/AdminItem" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /admin/items/{id}/assets:
    post:
      tags: [admin-items]
      description: Upload png, jpg/jpeg, or webp item asset up to 2 MB. Backend generates the stored filename and writes asset.upload audit event.
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content:
          image/png: { schema: { type: string, format: binary } }
          image/jpeg: { schema: { type: string, format: binary } }
          image/webp: { schema: { type: string, format: binary } }
      responses:
        "200": { description: Asset URL stored on the item., content: { application/json: { schema: { $ref: "#/components/schemas/AdminAssetUploadResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /admin/stats:
    get:
      tags: [admin-stats]
      description: Admin-only aggregate counts for dashboard cards.
      responses:
        "200": { description: Aggregate counts., content: { application/json: { schema: { $ref: "#/components/schemas/AdminStats" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /admin/logs:
    get:
      tags: [admin-logs]
      description: Admin-only audit log list with user, action, and RFC3339 date filters.
      parameters:
        - { in: query, name: user_id, schema: { type: string, format: uuid } }
        - { in: query, name: action, schema: { type: string } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 }, default: 50 }
        - { in: query, name: offset, schema: { type: integer, minimum: 0 }, default: 0 }
      responses:
        "200": { description: Audit events., content: { application/json: { schema: { $ref: "#/components/schemas/AdminAuditLogsResponse" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [service, status, env, request_id]
      properties:
        service: { type: string }
        status: { type: string, enum: [ok] }
        env: { type: string }
        request_id: { type: string }
    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        display_name: { type: string, minLength: 1 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    AuthUser:
      type: object
      required: [id, email, role, display_name]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [user, admin] }
        display_name: { type: string }
    AuthResponse:
      type: object
      required: [access_token, refresh_token, access_expires_at, user]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        access_expires_at: { type: string, format: date-time }
        user:
          $ref: "#/components/schemas/AuthUser"
    ProfilePatchRequest:
      type: object
      required: [display_name]
      additionalProperties: false
      properties:
        display_name: { type: string, minLength: 1, maxLength: 80 }
    ProfileResponse:
      type: object
      required: [display_name, progression, stats]
      properties:
        display_name: { type: string }
        progression: { $ref: "#/components/schemas/Progression" }
        stats: { $ref: "#/components/schemas/ProfileStats" }
    Progression:
      type: object
      required: [level, xp_total, xp_in_current_level, xp_to_next_level, xp_per_level]
      properties:
        level: { type: integer, minimum: 1 }
        xp_total: { type: integer, minimum: 0 }
        xp_in_current_level: { type: integer, minimum: 0 }
        xp_to_next_level: { type: integer, minimum: 1 }
        xp_per_level: { type: integer, enum: [1000] }
    ProfileStats:
      type: object
      required: [tasks_created, tasks_completed, tasks_archived]
      properties:
        tasks_created: { type: integer, minimum: 0 }
        tasks_completed: { type: integer, minimum: 0 }
        tasks_archived: { type: integer, minimum: 0 }
    Settings:
      type: object
      required: [notifications_enabled, default_reminder_minutes_before_deadline, disable_visual_randomness, reduced_motion]
      properties:
        notifications_enabled: { type: boolean }
        default_reminder_minutes_before_deadline: { type: integer, minimum: 0, maximum: 10080 }
        disable_visual_randomness: { type: boolean }
        reduced_motion: { type: boolean }
    SettingsPatchRequest:
      type: object
      additionalProperties: false
      properties:
        notifications_enabled: { type: boolean }
        default_reminder_minutes_before_deadline: { type: integer, minimum: 0, maximum: 10080 }
        disable_visual_randomness: { type: boolean }
        reduced_motion: { type: boolean }
    VisualRefreshRequest:
      type: object
      required: [event]
      additionalProperties: false
      properties:
        event:
          type: string
          enum: [app-enter, page-enter, task-created, task-completed, level-up, manual-refresh]
    VisualState:
      type: object
      required: [accent_color, background_variant, card_variant, task_button_text, task_list_heading, profile_background, decorative_detail, level_up_text, empty_state_text]
      properties:
        accent_color: { type: string, enum: ["#7dd3fc", "#a7f3d0", "#f9a8d4", "#fde68a"] }
        background_variant: { type: string, enum: [dark-ember, deep-forest, midnight] }
        card_variant: { type: string, enum: [graphite, pine, plum] }
        task_button_text: { type: string, enum: [Добавить задачу, Записать задачу, Новая задача] }
        task_list_heading: { type: string, enum: [Что сделать сейчас, План на сегодня, Активные задачи] }
        profile_background: { type: string, enum: [quiet-grid, night-lines, calm-shapes] }
        decorative_detail: { type: string, enum: [soft-sparks, thin-rings, small-dots] }
        level_up_text: { type: string, enum: [Новый уровень, Уровень повышен, Прогресс обновлен] }
        empty_state_text: { type: string, enum: [Пока нет активных задач, Список задач пуст, Можно добавить первую задачу] }
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        field_errors:
          type: object
          additionalProperties: { type: string }
        request_id: { type: string }
    PageParams:
      type: object
      properties:
        limit: { type: integer, minimum: 1, maximum: 100 }
        cursor: { type: string }
        page: { type: integer, minimum: 1 }
        sort: { type: string }
        filter: { type: string }
    Task:
      type: object
      required: [id, title, description, status, priority, complexity, overdue, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        category_id: { type: string, format: uuid, nullable: true }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [active, completed, archived] }
        priority: { type: string, enum: [low, normal, high] }
        complexity: { type: string, enum: [tiny, small, medium, large] }
        deadline_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        archived_at: { type: string, format: date-time, nullable: true }
        overdue: { type: boolean, description: Derived; true when status=active and deadline passed. Never persisted. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TaskCreateRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        category_id: { type: string, format: uuid, nullable: true, description: Defaults to the user's общее system category. }
        priority: { type: string, enum: [low, normal, high], default: normal }
        complexity: { type: string, enum: [tiny, small, medium, large], default: medium }
        deadline_at: { type: string, format: date-time, nullable: true }
    TaskPatchRequest:
      type: object
      description: Partial update. status and completed_at are intentionally absent — completion is owned by the reward engine (P06).
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        category_id: { type: string, format: uuid, nullable: true }
        priority: { type: string, enum: [low, normal, high] }
        complexity: { type: string, enum: [tiny, small, medium, large] }
        deadline_at: { type: string, format: date-time, nullable: true }
    TaskListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Task" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    TaskCategory:
      type: object
      required: [id, title, color, is_system]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        color: { type: string }
        is_system: { type: boolean }
    TaskCategoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/TaskCategory" }
    AdminUserSummary:
      type: object
      required: [id, email, role, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [user, admin] }
        created_at: { type: string, format: date-time }
    AdminUsersResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminUserSummary" }
        total: { type: integer, minimum: 0 }
    AdminItem:
      type: object
      required: [id, name, description, rarity, slot_key, asset_url, base_xp_multiplier, active, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        rarity: { type: string, enum: [common, rare, epic, legendary] }
        slot_key: { type: string }
        asset_url: { type: string }
        base_xp_multiplier: { type: number, format: float, minimum: 1 }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
    AdminItemsResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminItem" }
        total: { type: integer, minimum: 0 }
    AdminItemCreateRequest:
      type: object
      required: [name, rarity, slot_key]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        rarity: { type: string, enum: [common, rare, epic, legendary] }
        slot_key: { type: string, minLength: 1 }
        base_xp_multiplier: { type: number, format: float, minimum: 1, default: 1 }
    AdminItemPatchRequest:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        slot_key: { type: string, minLength: 1 }
        base_xp_multiplier: { type: number, format: float, minimum: 1 }
    AdminAssetUploadResponse:
      type: object
      required: [asset_url]
      properties:
        asset_url: { type: string }
    AdminStats:
      type: object
      required: [users, tasks, completed_tasks, reward_rolls, items, granted_items]
      properties:
        users: { type: integer, minimum: 0 }
        tasks: { type: integer, minimum: 0 }
        completed_tasks: { type: integer, minimum: 0 }
        reward_rolls: { type: integer, minimum: 0 }
        items: { type: integer, minimum: 0 }
        granted_items: { type: integer, minimum: 0 }
    AdminAuditLogEntry:
      type: object
      required: [id, user_id, action, details, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid, nullable: true }
        action: { type: string }
        details: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    AdminAuditLogsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminAuditLogEntry" }
    CompletionPayload:
      type: object
      description: Authoritative complete-task outcome. Server owns XP, level, drop, and roll outcomes; the client never sends or receives roll_value.
      required: [task, is_fresh_completion_event, xp_grant, progression_before, progression_after, level_ups, level_rewards, task_drop]
      properties:
        task:
          type: object
          required: [id, status]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [completed] }
        is_fresh_completion_event: { type: boolean, description: false on a repeat completion (no reroll, no new inserts). }
        xp_grant: { $ref: "#/components/schemas/XPGrant" }
        progression_before: { $ref: "#/components/schemas/ProgressionSnapshot" }
        progression_after: { $ref: "#/components/schemas/ProgressionSnapshot" }
        level_ups:
          type: array
          items: { type: integer, minimum: 1 }
        level_rewards:
          type: array
          items: { $ref: "#/components/schemas/LevelReward" }
        task_drop: { $ref: "#/components/schemas/DropResult" }
        visual_state: { $ref: "#/components/schemas/VisualState", nullable: true }
    XPGrant:
      type: object
      required: [base_xp, task_multiplier, equipment_xp_multiplier, final_xp]
      properties:
        base_xp: { type: integer, minimum: 0 }
        task_multiplier: { type: number, format: float, minimum: 0 }
        equipment_xp_multiplier: { type: number, format: float, minimum: 0 }
        final_xp: { type: integer, minimum: 0 }
    ProgressionSnapshot:
      type: object
      required: [xp_total, level, xp_in_current_level, xp_to_next_level]
      properties:
        xp_total: { type: integer, minimum: 0 }
        level: { type: integer, minimum: 1 }
        xp_in_current_level: { type: integer, minimum: 0 }
        xp_to_next_level: { type: integer, minimum: 1 }
    LevelReward:
      type: object
      required: [level, item]
      properties:
        level: { type: integer, minimum: 1, description: Granted on milestone levels divisible by 5. }
        item: { $ref: "#/components/schemas/InventoryItemView" }
    DropResult:
      type: object
      required: [dropped]
      properties:
        dropped: { type: boolean }
        rarity: { type: string, enum: [common, rare, epic, legendary] }
        item: { $ref: "#/components/schemas/InventoryItemView", nullable: true }
    InventoryItemView:
      type: object
      required: [id, inventory_item_id, name, rarity, xp_multiplier, slot_key, asset_url]
      properties:
        id: { type: string, format: uuid, description: user_inventory_item id. }
        inventory_item_id: { type: string, format: uuid, description: Catalog item id. }
        name: { type: string }
        rarity: { type: string, enum: [common, rare, epic, legendary] }
        xp_multiplier: { type: number, format: float, minimum: 1 }
        slot_key: { type: string }
        asset_url: { type: string }
    OwnedItem:
      type: object
      required: [id, inventory_item_id, name, rarity, xp_multiplier, slot_key, asset_url, source, equipped]
      description: Granted item owned by the user. Catalog active flag is NOT filtered; granted items stay usable after their catalog row is disabled.
      properties:
        id: { type: string, format: uuid, description: user_inventory_item id. }
        inventory_item_id: { type: string, format: uuid, description: Catalog item id. }
        name: { type: string }
        rarity: { type: string, enum: [common, rare, epic, legendary] }
        xp_multiplier: { type: number, format: float, minimum: 1 }
        slot_key: { type: string }
        asset_url: { type: string }
        source: { type: string, enum: [seed, task_drop, level_reward, admin_grant] }
        equipped: { type: boolean, description: True when this item is in an equipped slot. }
    EquippedItem:
      type: object
      required: [slot_key, user_inventory_item_id]
      properties:
        slot_key: { type: string }
        user_inventory_item_id: { type: string, format: uuid }
    InventoryResponse:
      type: object
      required: [items, equipped]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/OwnedItem" }
        equipped:
          type: array
          items: { $ref: "#/components/schemas/EquippedItem" }
    MascotSlot:
      type: object
      required: [slot_key, title, anchor_json]
      properties:
        slot_key: { type: string }
        title: { type: string }
        anchor_json: { type: object, description: Placement anchors (x/y/scale) for the frontend. }
    ActiveMascot:
      type: object
      required: [mascot_id, name, asset_url, slots]
      properties:
        mascot_id: { type: string, format: uuid }
        name: { type: string }
        asset_url: { type: string }
        slots:
          type: array
          items: { $ref: "#/components/schemas/MascotSlot" }
